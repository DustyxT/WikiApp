# File: application.properties
# Purpose: Spring Boot configuration. Each line tweaks how the app runs.

# Run the embedded Tomcat server on port 8080 (default).
server.port=8080

# Disable Thymeleaf caching during development so HTML edits show up
# without restarting the server.
spring.thymeleaf.cache=false

# Friendly application name shown in logs.
spring.application.name=WikiApp

# ---------------- PART B: Database (H2) ----------------

# H2 file-based database. The data is stored in ./data/wikidb.* files
# so it survives application restarts.
spring.datasource.url=jdbc:h2:file:./data/wikidb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable the H2 web console at http://localhost:8080/h2-console
# (handy for showing the database during the demo).
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate settings.
# update = create tables if missing, alter if entity changes; never drop data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Run data.sql AFTER Hibernate creates the tables (so seeding works).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
