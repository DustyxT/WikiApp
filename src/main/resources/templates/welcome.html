<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>WikiApp — Welcome</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

    <div class="card success">
        <h1>Welcome!</h1>

        <!-- th:text replaces the placeholder text with the model attribute "username" -->
        <p>Hello <strong th:text="${username}">user</strong>, you have logged in successfully.</p>

        <p>The full Wiki interface (article browsing and CRUD) will be available in Part B.</p>

        <a class="btn primary" th:href="@{/login}">Log out</a>
    </div>

</body>
</html>
