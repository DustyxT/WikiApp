    Purpose: PART B - The admin home page. Shows every article in a table
             with Edit and Delete buttons. A "New article" button at the top
             starts the create flow.
-->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin Dashboard - WikiApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="page">

    <nav class="topbar admin">
        <a class="brand" th:href="@{/admin}">WikiApp Admin</a>
        <div class="links">
            <span>Logged in as <strong th:text="${adminUser}">admin</strong></span>
            <a th:href="@{/wiki}">View public wiki</a>
            <a th:href="@{/logout}">Log out</a>
        </div>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>Manage articles</h1>
            <a class="btn primary" th:href="@{/admin/new}">+ New article</a>
        </div>

        <p th:if="${#lists.isEmpty(articles)}" class="empty">
            No articles yet. Click "New article" to add the first one.
        </p>

        <table class="data-table" th:unless="${#lists.isEmpty(articles)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Last updated</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Loop over every article. -->
                <tr th:each="a : ${articles}">
                    <td th:text="${a.id}">1</td>
                    <td>
                        <a th:href="@{'/wiki/' + ${a.id}}" th:text="${a.title}">Title</a>
                    </td>
                    <td><span class="badge" th:text="${a.category}">cat</span></td>
                    <td th:text="${#temporals.format(a.lastUpdated, 'dd MMM yyyy HH:mm')}">date</td>
                    <td class="actions">
                        <a class="btn small" th:href="@{'/admin/edit/' + ${a.id}}">Edit</a>
                        <a class="btn small danger" th:href="@{'/admin/delete/' + ${a.id}}">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

</body>
</html>
