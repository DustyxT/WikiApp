    File: admin/form.html
    Purpose: PART B - A SINGLE template used for both creating a new article
             and editing an existing one. The "mode" model attribute decides
             the heading and the form-action URL.
-->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${mode == 'edit'} ? 'Edit article - WikiApp' : 'New article - WikiApp'">Article form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="page">

    <nav class="topbar admin">
        <a class="brand" th:href="@{/admin}">WikiApp Admin</a>
        <div class="links">
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/logout}">Log out</a>
        </div>
    </nav>

    <main class="container narrow">

        <!-- The heading switches based on whether we are creating or editing. -->
        <h1 th:text="${mode == 'edit'} ? 'Edit article' : 'New article'">Article form</h1>

        <!--
            For new articles we POST to /admin.
            For edits we POST to /admin/edit/{id}.
            We use Thymeleaf's ?: ternary expression to choose between them.
        -->
        <form th:action="${mode == 'edit'} ? @{'/admin/edit/' + ${article.id}} : @{/admin}"
              th:object="${article}" method="post" class="article-form">

            <label for="title">Title</label>
            <input type="text" id="title" th:field="*{title}"/>
            <!-- th:errors shows validation errors from BindingResult, e.g. @NotBlank -->
            <p class="error-text" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

            <label for="category">Category</label>
            <input type="text" id="category" th:field="*{category}"
                   placeholder="e.g. Programming, History, General"/>
            <p class="error-text" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>

            <label for="content">Content</label>
            <textarea id="content" th:field="*{content}" rows="10"></textarea>
            <p class="error-text" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>

            <div class="buttons">
                <a class="btn secondary" th:href="@{/admin}">Cancel</a>
                <button class="btn primary" type="submit"
                        th:text="${mode == 'edit'} ? 'Save changes' : 'Create article'">Save</button>
            </div>
        </form>
    </main>

</body>
</html>
