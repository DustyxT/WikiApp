    Author: Movindu Lochana

    File: wiki/list.html
    Purpose: PART B - Public wiki home page. Lists every article and lets
             the visitor filter by category or search by title.
             When an admin is logged in, extra controls appear.
-->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>WikiApp - Articles</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="page">

    <!-- Top navigation bar -->
    <nav class="topbar">
        <a class="brand" th:href="@{/wiki}">WikiApp</a>
        <div class="links">
            <a th:href="@{/wiki}">All articles</a>
            <!-- isAdmin is set by WikiController by checking the HttpSession.
                 If true, show admin quick-links. If false, show login link. -->
            <th:block th:if="${isAdmin}">
                <a class="btn nav-btn" th:href="@{/admin/new}">+ New article</a>
                <a th:href="@{/admin}">Admin dashboard</a>
                <a th:href="@{/logout}">Log out</a>
            </th:block>
            <a th:unless="${isAdmin}" th:href="@{/login}">Admin login</a>
        </div>
    </nav>

    <main class="container">

        <!-- Page heading -->
        <div class="page-header">
            <h1>Articles</h1>
            <span class="article-count"
                  th:text="${#lists.size(articles)} + ' article(s)'">0 articles</span>
        </div>

        <!-- Search form -->
        <form class="search" th:action="@{/wiki}" method="get">
            <input type="text" name="search" th:value="${search}"
                   placeholder="Search articles by title..."/>
            <button class="btn primary" type="submit">Search</button>
            <a class="btn secondary" th:href="@{/wiki}">Clear</a>
        </form>

        <!-- Category filter pills.
             th:each loops over the categories list the controller passed in.
             Clicking a pill adds ?category=X to the URL which the controller picks up. -->
        <div class="category-filters" th:if="${not #lists.isEmpty(categories)}">
            <span class="filter-label">Filter:</span>
            <a class="filter-pill"
               th:classappend="${category == null and search == null} ? ' active'"
               th:href="@{/wiki}">All</a>
            <a class="filter-pill"
               th:each="cat : ${categories}"
               th:classappend="${category == cat} ? ' active'"
               th:href="@{/wiki(category=${cat})}"
               th:text="${cat}">Category</a>
        </div>

        <!-- Friendly note when no articles match -->
        <p th:if="${#lists.isEmpty(articles)}" class="empty">
            No articles found. Try a different search or category.
        </p>

        <!-- Article cards grid.
             When the admin is logged in, each card also shows Edit and Delete buttons. -->
        <div class="article-grid" th:unless="${#lists.isEmpty(articles)}">
            <article class="article-card" th:each="a : ${articles}">
                <span class="badge" th:text="${a.category}">Category</span>
                <h2>
                    <a th:href="@{'/wiki/' + ${a.id}}" th:text="${a.title}">Title</a>
                </h2>
                <p class="preview"
                   th:text="${#strings.abbreviate(a.content, 120)}">Preview</p>
                <p class="meta">
                    Updated:
                    <span th:text="${#temporals.format(a.lastUpdated, 'dd MMM yyyy')}">date</span>
                </p>
                <!-- Admin-only action row at the bottom of each card -->
                <div class="card-actions" th:if="${isAdmin}">
                    <a class="btn small" th:href="@{'/admin/edit/' + ${a.id}}">Edit</a>
                    <a class="btn small danger" th:href="@{'/admin/delete/' + ${a.id}}">Delete</a>
                </div>
            </article>
        </div>

    </main>

    <footer class="site-footer">
        <p>WikiApp | BIT235 Assessment 2 | Movindu Lochana (s1577380)</p>
    </footer>

</body>
</html>
